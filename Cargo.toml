[package]
name = "ae"
version = "0.1.0"
edition = "2024"
description = "Acronym Engine — real-time acronym expansion and definition extraction."
license = "MIT"

[[bin]]
name = "ae"
path = "src/main.rs"

[lib]
name = "ae"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
fs2 = "0.4"
rusqlite = { version = "0.32", features = ["bundled"] }
regex = "1"
